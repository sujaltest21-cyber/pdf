<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Barcode MRP Editor - Console</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <!-- PDF Libraries -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            background-color: #faf6ee; /* Retro Warm Cream */
            background-image: 
                radial-gradient(#d5d0c6 1.5px, transparent 1.5px),
                radial-gradient(#d5d0c6 1.5px, #faf6ee 1.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            min-height: 100vh;
            color: #000000;
            line-height: 1.5;
            padding: 16px;
        }

        .app-container {
            max-width: 1200px;
            margin: 16px auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ----------------------------------------------------
           NEO-BRUTALIST SIDEBAR PANEL
           ---------------------------------------------------- */
        .sidebar {
            background: #ffffff;
            border: 4px solid #000000;
            padding: 28px;
            box-shadow: 10px 10px 0px #000000;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            transition: all 0.15s ease;
        }



        /* ----------------------------------------------------
           FILE PICKER (Neo-Brutalist Card)
           ---------------------------------------------------- */
        .clipboard-board {
            background: #ffffff;
            border: 3px solid #000000;
            padding: 8px;
            box-shadow: 4px 4px 0px #000000;
        }

        .upload-zone {
            background: #e0f2fe; /* Sky Blue background */
            border: 3px dashed #000000;
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease-in-out;
            min-height: 110px;
        }
        .upload-zone:hover {
            background: #bae6fd;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px #000000;
        }

        .upload-icon {
            width: 32px;
            height: 32px;
            color: #000000;
            margin-bottom: 8px;
        }
        .upload-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            font-weight: 900;
            color: #000000;
            letter-spacing: 0.05em;
        }
        .upload-subtext {
            font-size: 11px;
            color: #4b5563;
            margin-top: 2px;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Selected File Card */
        .file-card {
            display: flex;
            align-items: center;
            background: #dcfce7; /* Light Green */
            border: 3px solid #000000;
            padding: 14px 12px;
            position: relative;
            box-shadow: 4px 4px 0px #000000;
            animation: fadeIn 0.15s ease-out;
            min-height: 70px;
        }
        .file-icon {
            width: 28px;
            height: 28px;
            color: #000000;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .file-info {
            flex-grow: 1;
            min-width: 0;
        }
        .file-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            font-weight: 900;
            color: #000000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size {
            font-size: 11px;
            font-weight: 700;
            color: #15803d;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Red clear file badge button */
        .clear-file-btn {
            position: absolute;
            top: -12px;
            right: -12px;
            background: #ef4444;
            border: 2px solid #000000;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 12;
            transition: all 0.05s ease;
            box-shadow: 2px 2px 0px #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
        }
        .clear-file-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #000000;
        }
        .clear-file-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* ----------------------------------------------------
           FORM CONTROLS (Thick borders)
           ---------------------------------------------------- */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .engraved-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            font-weight: 900;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .inset-input-slot {
            position: relative;
        }
        .inset-input-slot input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 3px solid #000000;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #000000;
            background: #ffffff;
            box-shadow: 4px 4px 0px #000000;
            outline: none;
            transition: all 0.1s ease;
        }
        .inset-input-slot input[type="text"]:focus {
            background: #fafafa;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000000;
        }

        /* ----------------------------------------------------
           ACTION BUTTONS (Springy Neo-Brutalist Pop)
           ---------------------------------------------------- */
        .btn-group-console {
            display: flex;
            flex-direction: row;
            gap: 16px;
            margin-top: 4px;
        }
        .button-module {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        button.action-btn {
            width: 100%;
            height: 46px;
            position: relative;
            border: 3px solid #000000;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            user-select: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.08s ease;
        }

        /* Purple Preview Button */
        .blue-button {
            background: #c084fc; /* Bright Purple */
            color: #000000;
            box-shadow: 4px 4px 0px #000000;
        }
        .blue-button:hover:not(:disabled) {
            background: #d8b4fe;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000000;
        }
        .blue-button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* Emerald Green Download Button */
        .green-button {
            background: #4ade80; /* Bright Green */
            color: #000000;
            box-shadow: 4px 4px 0px #000000;
        }
        .green-button:hover:not(:disabled) {
            background: #86efac;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000000;
        }
        .green-button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* Disabled Button States */
        button.action-btn:disabled {
            background: #e5e7eb !important;
            color: #9ca3af !important;
            border-color: #9ca3af !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Flat Status LED Indicators */
        .led-indicator-module {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #000000;
            transition: all 0.15s ease;
        }
        .led-blue {
            background: #3b82f6;
            box-shadow: 2px 2px 0px #000000;
        }
        .led-red {
            background: #ef4444;
            box-shadow: 2px 2px 0px #000000;
        }
        .led-green {
            background: #22c55e;
            box-shadow: 2px 2px 0px #000000;
        }
        .led-off {
            background: #e5e7eb;
            box-shadow: 2px 2px 0px #000000;
        }
        .led-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            font-weight: 900;
            color: #000000;
            text-transform: uppercase;
        }

        /* ----------------------------------------------------
           LCD / FLAT STATUS CONSOLE ALERT BOX
           ---------------------------------------------------- */
        .lcd-display-container {
            margin-top: 4px;
        }
        .lcd-bezel {
            position: relative;
        }
        .lcd-screen {
            background: #86efac; /* Light Green alert state initially */
            border: 3px solid #000000;
            border-radius: 4px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            font-weight: 900;
            color: #000000;
            text-align: center;
            box-shadow: 4px 4px 0px #000000;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        /* ----------------------------------------------------
           PREVIEW PANE (Technical Board Box)
           ---------------------------------------------------- */
        .preview-pane {
            background: #ffffff;
            border: 4px solid #000000;
            padding: 24px;
            box-shadow: 10px 10px 0px #000000;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideUp 0.3s ease-out;
            position: relative;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #000000;
            padding-bottom: 12px;
        }
        .preview-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.05em;
            color: #000000;
            text-transform: uppercase;
        }
        
        .close-preview-btn {
            background: #ef4444;
            border: 2px solid #000000;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 900;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px #000000;
            transition: all 0.1s ease;
        }
        .close-preview-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #000000;
            background: #f87171;
        }
        .close-preview-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000000;
        }

        .preview-scroll {
            overflow-y: auto;
            max-height: 600px;
            padding: 24px;
            background: #f3f4f6; /* Flat grey backdrop */
            border: 3px solid #000000;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            position: relative;
        }

        .preview-page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            z-index: 2;
        }

        .preview-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 6px 6px 0px #000000;
            background: #ffffff;
            border: 3px solid #000000;
            border-radius: 4px;
        }
        .preview-page-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            font-weight: 900;
            color: #000000;
            background: #fef08a; /* Yellow badge */
            border: 2px solid #000000;
            padding: 4px 8px;
            box-shadow: 2px 2px 0px #000000;
        }

        .preview-loading, .preview-error {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            font-weight: 900;
            color: #000000;
            padding: 30px;
            text-align: center;
            z-index: 2;
        }
        .preview-error {
            color: #ef4444;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none !important;
        }

        /* Desktop Layout Config */
        @media (min-width: 1024px) {
            body {
                padding: 16px;
                height: 100vh;
                overflow: hidden;
            }
            .app-container {
                flex-direction: row;
                align-items: stretch;
                gap: 24px;
                height: calc(100vh - 32px);
                margin: 0 auto;
            }
            .sidebar {
                width: 380px;
                flex-shrink: 0;
                height: 100%;
                overflow-y: auto;
            }
            .sidebar::-webkit-scrollbar {
                width: 4px;
            }
            .sidebar::-webkit-scrollbar-thumb {
                background: #000000;
                border-radius: 2px;
            }
            .preview-pane {
                flex-grow: 1;
                min-width: 0;
                height: 100%;
            }
            .preview-scroll {
                flex-grow: 1;
                min-height: 0;
                max-height: none;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Left Sidebar: Controls Card -->
    <div class="sidebar">

        
        <!-- File Picker Group -->
        <div class="input-group">
            <label class="engraved-label">Select PDF Label File</label>
            <!-- Hidden input -->
            <input type="file" id="pdf" accept=".pdf" style="display: none;" onchange="onFileSelect()">
            
            <!-- File container board -->
            <div class="clipboard-board">
                <!-- Dropzone -->
                <div id="upload-zone" class="upload-zone" onclick="document.getElementById('pdf').click()">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <div class="upload-text">DRAG & DROP FILE</div>
                    <div class="upload-subtext">OR CLICK HERE TO BROWSE</div>
                </div>

                <!-- Selected File Card -->
                <div id="file-card" class="file-card hidden">
                    <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <div class="file-info">
                        <div id="file-title" class="file-title">Label.pdf</div>
                        <div id="file-size" class="file-size">0 KB</div>
                    </div>
                    <!-- Close button -->
                    <button type="button" id="clear-file-btn" class="clear-file-btn" onclick="clearFile()" title="Deselect File">
                        ✕
                    </button>
                </div>
            </div>
        </div>

        <!-- MRP Text Input Group -->
        <div class="input-group">
            <label for="mrp" class="engraved-label">MRP Text Overlay Content</label>
            <div class="inset-input-slot">
                <input type="text" id="mrp" value="MRP :- 1999">
            </div>
        </div>

        <!-- Rename File Input Group -->
        <div class="input-group">
            <label for="filename-input" class="engraved-label">Output Filename (Download)</label>
            <div class="inset-input-slot">
                <input type="text" id="filename-input" placeholder="Enter output file name...">
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="btn-group-console">
            <!-- Preview Button -->
            <div class="button-module">
                <button class="action-btn blue-button" onclick="processSmartPDF()">
                    PREVIEW
                </button>
                <div class="led-indicator-module">
                    <div class="led led-blue" id="preview-led"></div>
                    <span class="led-label">ACTIVE</span>
                </div>
            </div>
            
            <!-- Download Button -->
            <div class="button-module">
                <button id="download-btn" class="action-btn green-button" onclick="downloadPDF()" disabled>
                    DOWNLOAD
                </button>
                <div class="led-indicator-module">
                    <div class="led led-red" id="download-led"></div>
                    <span class="led-label">READY</span>
                </div>
            </div>
        </div>

        <!-- Status Console display box -->
        <div class="lcd-display-container">
            <div class="lcd-bezel">
                <div id="log" class="lcd-screen">SYSTEM READY</div>
            </div>
        </div>
    </div>

    <!-- Right Area: Drafting Table -->
    <div id="preview-outer" class="preview-pane hidden">
        <div class="preview-header">
            <span class="preview-title">DRAFTING TABLE PREVIEW</span>
            <button class="close-preview-btn" onclick="closePreview()" title="Close Preview">&times;</button>
        </div>
        <div id="preview-container" class="preview-scroll">
            <!-- Canvas objects will render here -->
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let selectedFile = null;
    let editedPdfBytes = null;
    let modifiedPdfBytes = null;

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function handleFile(file) {
        if (!file || file.type !== "application/pdf") {
            alert("Please select or drop a valid PDF file!");
            return;
        }
        selectedFile = file;
        
        // Toggle file card and upload zone
        document.getElementById('upload-zone').classList.add('hidden');
        document.getElementById('file-card').classList.remove('hidden');
        
        // File badges info
        document.getElementById('file-title').innerText = selectedFile.name;
        document.getElementById('file-size').innerText = formatBytes(selectedFile.size);
        
        // Output name default
        const baseName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) || selectedFile.name;
        document.getElementById('filename-input').value = "Final_" + baseName;

        // Update Neo-Brutalist Log State
        const logDiv = document.getElementById('log');
        logDiv.innerText = "FILE LOADED. PRESS PREVIEW.";
        logDiv.style.background = "#fde047"; // Yellow Warning color
        logDiv.style.color = "#000000";

        // LEDs change state
        document.getElementById('download-led').className = 'led led-red';
        document.getElementById('preview-led').className = 'led led-blue';
    }

    function onFileSelect() {
        const fileInput = document.getElementById('pdf');
        if (fileInput.files.length > 0) {
            handleFile(fileInput.files[0]);
        }
    }

    function clearFile() {
        const fileInput = document.getElementById('pdf');
        fileInput.value = '';
        selectedFile = null;
        editedPdfBytes = null;
        modifiedPdfBytes = null;
        
        document.getElementById('upload-zone').classList.remove('hidden');
        document.getElementById('file-card').classList.add('hidden');
        document.getElementById('filename-input').value = '';
        document.getElementById('download-btn').disabled = true;
        
        closePreview();
        
        // Reset Log to ready status green background
        const logDiv = document.getElementById('log');
        logDiv.innerText = "SYSTEM READY";
        logDiv.style.background = "#86efac"; // Light green
        logDiv.style.color = "#000000";

        // Reset LEDs
        document.getElementById('download-led').className = 'led led-red';
        document.getElementById('preview-led').className = 'led led-blue';
    }

    function closePreview() {
        const previewOuter = document.getElementById('preview-outer');
        previewOuter.classList.add('hidden');
        
        const previewContainer = document.getElementById('preview-container');
        previewContainer.innerHTML = '';
    }

    async function processSmartPDF() {
        const mrpText = document.getElementById('mrp').value;
        const logDiv = document.getElementById('log');

        if (!selectedFile) {
            alert("Please select a PDF file first!");
            return;
        }

        // Change LCD display status to yellow scan mode
        logDiv.innerText = "SCANNING LABELS...";
        logDiv.style.background = "#fde047"; // Amber yellow status
        logDiv.style.color = "#000000";

        try {
            const arrayBuffer = await selectedFile.arrayBuffer();
            
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer.slice(0) });
            const pdfTextDoc = await loadingTask.promise;
            
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();
            const helveticaFont = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

            let totalMatches = 0;

            for (let i = 0; i < pdfTextDoc.numPages; i++) {
                const textPage = await pdfTextDoc.getPage(i + 1);
                const textContent = await textPage.getTextContent();
                const pageLib = pages[i];

                // Collect all "NEW" items on this page
                const newItemsOnPage = textContent.items.filter(item => {
                    const cleanStr = item.str.trim();
                    return cleanStr === "New" || cleanStr === "NEW" || cleanStr.includes("New");
                });

                // Group the "NEW" items on this page into columns by X coordinate
                const colsMap = [];
                newItemsOnPage.forEach(item => {
                    const cx = item.transform[4];
                    let existingCol = colsMap.find(c => Math.abs(c.x - cx) < 30);
                    if (!existingCol) {
                        existingCol = { x: cx, items: [] };
                        colsMap.push(existingCol);
                    }
                    existingCol.items.push(item);
                });

                // Sort columns by x coordinate
                colsMap.sort((a, b) => a.x - b.x);

                // Compute column width spacing
                let colWidth = 180; // default label width fallback
                if (colsMap.length > 1) {
                    let totalSpacing = 0;
                    for (let j = 0; j < colsMap.length - 1; j++) {
                        totalSpacing += colsMap[j+1].x - colsMap[j].x;
                    }
                    colWidth = totalSpacing / (colsMap.length - 1);
                }

                // Determine the right boundary for each column based on its items and title lines
                colsMap.forEach(col => {
                    let maxRight = 0;
                    col.items.forEach(newItem => {
                        const x_new = newItem.transform[4];
                        const y_new = newItem.transform[5];
                        
                        // Find any title items directly above this label
                        const titleItems = textContent.items.filter(other => {
                            const ox = other.transform[4];
                            const oy = other.transform[5];
                            // Y is ~10 points above NEW, X is in this label's horizontal column range
                            return Math.abs(oy - (y_new + 10)) < 3 && 
                                   ox >= x_new - 10 && 
                                   ox < x_new + colWidth - 10;
                        });

                        titleItems.forEach(tItem => {
                            const rEdge = tItem.transform[4] + tItem.width;
                            if (rEdge > maxRight) {
                                maxRight = rEdge;
                            }
                        });
                    });

                    // Fallback to 82% of the column width if no title lines or they are very short
                    const fallbackWidth = colWidth * 0.82;
                    col.rightEdge = Math.max(maxRight, col.x + fallbackWidth);
                });

                textContent.items.forEach(item => {
                    const cleanStr = item.str.trim();
                    
                    if (cleanStr === "New" || cleanStr === "NEW" || cleanStr.includes("New")) {
                        totalMatches++;

                        const x = item.transform[4];
                        const y = item.transform[5];
                        
                        // Find which column this item belongs to
                        const col = colsMap.find(c => Math.abs(c.x - x) < 30);
                        const rightEdge = col ? col.rightEdge : (x + colWidth * 0.82);

                        // Calculate the width of the MRP text to align it to the right
                        const textWidth = helveticaFont.widthOfTextAtSize(mrpText, 8.5);
                        // Align the text so it ends at rightEdge (minus 2pt right margin padding)
                        const drawX = rightEdge - textWidth - 2;

                        pageLib.drawText(mrpText, {
                            x: drawX, 
                            y: y,  
                            size: 8.5,   
                            font: helveticaFont,
                            color: PDFLib.rgb(0, 0, 0)
                        });
                    }
                });
            }

            if (totalMatches === 0) {
                logDiv.innerText = "WORD 'NEW' NOT DETECTED";
                logDiv.style.background = "#f87171"; // Warning Red
                logDiv.style.color = "#000000";
                return;
            }

            modifiedPdfBytes = await pdfDoc.save();

            // Success LCD update
            logDiv.innerText = `READY: ${totalMatches} LABELS DETECTED.`;
            logDiv.style.background = "#86efac"; // Success green background
            logDiv.style.color = "#000000";
            
            document.getElementById('download-btn').disabled = false;

            // Turn LEDs Green for Ready state
            document.getElementById('download-led').className = 'led led-green';
            document.getElementById('preview-led').className = 'led led-green';

            await renderPreview(modifiedPdfBytes);
            
        } catch (err) {
            console.error(err);
            logDiv.innerText = "ERROR IN CORE PROCESS";
            logDiv.style.background = "#f87171"; // Error red
            logDiv.style.color = "#000000";
        }
    }

    async function renderPreview(pdfBytes) {
        const previewContainer = document.getElementById('preview-container');
        previewContainer.innerHTML = '<div class="preview-loading">RENDERING VECTOR PREVIEW SHEETS...</div>';
        
        const previewOuter = document.getElementById('preview-outer');
        previewOuter.classList.remove('hidden');
        
        try {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes.slice(0) });
            const pdfDoc = await loadingTask.promise;
            
            previewContainer.innerHTML = '';
            
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                
                const canvas = document.createElement('canvas');
                canvas.className = 'preview-canvas';
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'preview-page-wrapper';
                
                const pageLabel = document.createElement('div');
                pageLabel.className = 'preview-page-label';
                pageLabel.innerText = `SHEET ${i} OF ${pdfDoc.numPages}`;
                
                pageWrapper.appendChild(canvas);
                pageWrapper.appendChild(pageLabel);
                
                previewContainer.appendChild(pageWrapper);
            }
        } catch (err) {
            console.error(err);
            previewContainer.innerHTML = '<div class="preview-error">PREVIEW BOARD RENDER ERROR.</div>';
        }
    }

    function downloadPDF() {
        if (!modifiedPdfBytes) {
            alert("Please click Preview first!");
            return;
        }
        
        let filename = document.getElementById('filename-input').value.trim();
        if (!filename) {
            filename = "Final_Modified_PDF";
        }
        
        if (!filename.toLowerCase().endsWith('.pdf')) {
            filename += '.pdf';
        }
        
        const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        
        const logDiv = document.getElementById('log');
        logDiv.innerText = "FILE COMPILATION COMPLETED";
        logDiv.style.background = "#86efac"; // Green success
        logDiv.style.color = "#000000";
    }

    // Drag & Drop Handling
    const uploadZone = document.getElementById('upload-zone');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        uploadZone.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadZone.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
        uploadZone.style.background = "#bae6fd";
        uploadZone.style.borderColor = "#000000";
    }

    function unhighlight(e) {
        uploadZone.style.background = "#e0f2fe";
        uploadZone.style.borderColor = "#000000";
    }

    uploadZone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
            handleFile(files[0]);
        }
    }
</script>
