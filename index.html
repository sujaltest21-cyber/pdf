<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Barcode MRP Editor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PDF Libraries -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --bg-app: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-color: #cbd5e1;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --input-bg: #f8fafc;
            --input-focus-border: #6366f1;
            --btn-primary: #4f46e5;
            --btn-primary-hover: #4338ca;
            --btn-secondary: #10b981;
            --btn-secondary-hover: #059669;
            --file-card-bg: #f0fdf4;
            --file-card-border: #bbf7d0;
            --file-card-text: #14532d;
            --file-card-icon: #16a34a;
            --preview-scroll-bg: #f8fafc;
            --theme-toggle-bg: #f1f5f9;
            --theme-toggle-hover: #e2e8f0;
            --theme-toggle-color: #64748b;
        }
        [data-theme="dark"] {
            --bg-app: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --input-bg: #0f172a;
            --input-focus-border: #818cf8;
            --btn-primary: #6366f1;
            --btn-primary-hover: #4f46e5;
            --btn-secondary: #10b981;
            --btn-secondary-hover: #059669;
            --file-card-bg: #064e3b;
            --file-card-border: #047857;
            --file-card-text: #ecfdf5;
            --file-card-icon: #34d399;
            --preview-scroll-bg: #0f172a;
            --theme-toggle-bg: #334155;
            --theme-toggle-hover: #475569;
            --theme-toggle-color: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 20px;
            transition: background-color 0.2s, color 0.2s;
        }
        .app-container {
            max-width: 1250px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Sidebar styling */
        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px var(--shadow-color), 0 2px 4px -2px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        h2 {
            color: var(--btn-primary);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.025em;
        }

        /* Theme Toggle Button */
        .theme-toggle-btn {
            background: var(--theme-toggle-bg);
            border: 1px solid var(--border-color);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--theme-toggle-color);
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover {
            background: var(--theme-toggle-hover);
        }

        /* Custom Upload Zone */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background: var(--input-bg);
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upload-zone:hover {
            border-color: var(--btn-primary);
            background: var(--theme-toggle-bg);
        }
        .upload-icon {
            width: 40px;
            height: 40px;
            color: var(--btn-primary);
            margin-bottom: 12px;
        }
        .upload-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* File Badge Card */
        .file-card {
            display: flex;
            align-items: center;
            background: var(--file-card-bg);
            border: 1px solid var(--file-card-border);
            padding: 16px;
            border-radius: 12px;
            position: relative;
            animation: fadeIn 0.2s ease-out;
        }
        .file-icon {
            width: 32px;
            height: 32px;
            color: var(--file-card-icon);
            margin-right: 12px;
            flex-shrink: 0;
        }
        .file-info {
            flex-grow: 1;
            min-width: 0;
        }
        .file-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--file-card-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size {
            font-size: 12px;
            color: var(--file-card-text);
            margin-top: 2px;
        }
        .clear-file-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--file-card-text);
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
            margin-left: 10px;
            transition: color 0.15s;
        }
        .clear-file-btn:hover {
            color: #b91c1c;
        }

        /* Form Controls */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            background: var(--input-bg);
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: var(--bg-card);
        }
        input[type="color"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 100%;
            height: 45px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--input-bg);
            cursor: pointer;
            padding: 4px;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        button.action-btn {
            background-color: var(--btn-primary);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s, opacity 0.2s;
        }
        button.action-btn:hover:not(:disabled) {
            background-color: var(--btn-primary-hover);
        }
        button.action-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        button.action-btn:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
        }
        button.secondary-btn {
            background-color: var(--btn-secondary);
        }
        button.secondary-btn:hover:not(:disabled) {
            background-color: var(--btn-secondary-hover);
        }

        #log {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
            padding: 10px;
            background-color: var(--input-bg);
            border-radius: 8px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        /* Preview Pane Styling */
        .preview-pane {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px var(--shadow-color), 0 2px 4px -2px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: slideUp 0.3s ease-out;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }
        .preview-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .close-preview-btn {
            background: var(--theme-toggle-bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            color: var(--theme-toggle-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .close-preview-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        .preview-scroll {
            overflow-y: auto;
            max-height: 600px;
            padding: 15px;
            background: var(--preview-scroll-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            transition: background-color 0.2s;
        }
        .preview-page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .preview-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 12px var(--shadow-color);
            border-radius: 8px;
            background: white;
        }
        .preview-page-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .preview-loading, .preview-error {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 40px;
            text-align: center;
        }
        .preview-error {
            color: #ef4444;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Utility classes */
        .hidden {
            display: none !important;
        }

        /* Desktop Breakpoint */
        @media (min-width: 1024px) {
            body {
                padding: 40px;
            }
            .app-container {
                flex-direction: row;
                align-items: flex-start;
            }
            .sidebar {
                width: 400px;
                flex-shrink: 0;
                position: sticky;
                top: 40px;
            }
            .preview-pane {
                flex-grow: 1;
                min-width: 0;
                max-height: calc(100vh - 80px);
            }
            .preview-scroll {
                max-height: calc(100vh - 180px);
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Left Sidebar: Controls -->
    <div class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 5px;">
            <h2>Smart Barcode MRP Editor</h2>
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <svg class="sun-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
        
        <!-- File Picker Group -->
        <div class="input-group">
            <label>PDF Label File Select Karo:</label>
            <!-- Hidden real file input -->
            <input type="file" id="pdf" accept=".pdf" style="display: none;" onchange="onFileSelect()">
            
            <!-- Upload Dropzone (shown when no file is selected) -->
            <div id="upload-zone" class="upload-zone" onclick="document.getElementById('pdf').click()">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <div class="upload-text">PDF ફાઇલ સિલેક્ટ કરો</div>
            </div>

            <!-- Selected File Badge (shown when file is selected) -->
            <div id="file-card" class="file-card hidden">
                <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <div class="file-info">
                    <div id="file-title" class="file-title">Label.pdf</div>
                    <div id="file-size" class="file-size">0 KB</div>
                </div>
                <button type="button" id="clear-file-btn" class="clear-file-btn" onclick="clearFile()" title="Deselect File">&times;</button>
            </div>
        </div>

        <!-- MRP Text Input Group -->
        <div class="input-group">
            <label for="mrp">MRP Text Lakho:</label>
            <input type="text" id="mrp" value="MRP :- 1999">
        </div>

        <!-- Offset Controls Group -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="input-group">
                <label for="offset-x">X Offset (ડાબે/જમણે):</label>
                <input type="number" id="offset-x" value="100" step="5">
            </div>
            <div class="input-group">
                <label for="offset-y">Y Offset (ઉપર/નીચે):</label>
                <input type="number" id="offset-y" value="0" step="5">
            </div>
        </div>

        <!-- Font Size & Color Controls Group -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="input-group">
                <label for="font-size">Font Size:</label>
                <input type="number" id="font-size" value="8.5" step="0.5" min="4" max="36">
            </div>
            <div class="input-group">
                <label for="font-color">Font Color:</label>
                <input type="color" id="font-color" value="#000000">
            </div>
        </div>

        <!-- Rename File Input Group -->
        <div class="input-group">
            <label for="filename-input">New File Name (ડાઉનલોડ માટે):</label>
            <input type="text" id="filename-input" placeholder="File name lakho...">
        </div>

        <!-- Action Buttons -->
        <div class="btn-group">
            <button class="action-btn" onclick="processSmartPDF()">Preview Set Karo</button>
            <button id="download-btn" class="action-btn secondary-btn" onclick="downloadPDF()" disabled>Download PDF</button>
        </div>

        <!-- Status Log -->
        <div id="log">કોઈ ફાઈલ અપલોડ કરેલ નથી</div>
    </div>

    <!-- Right Area: Document Preview Pane -->
    <div id="preview-outer" class="preview-pane hidden">
        <div class="preview-header">
            <span class="preview-title">Document Preview</span>
            <div style="display: flex; gap: 8px; align-items: center; margin-left: auto; margin-right: 16px;">
                <button class="close-preview-btn" onclick="zoomPreview(-0.25)" title="Zoom Out" style="font-size: 16px;">-</button>
                <span id="zoom-label" style="font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 45px; text-align: center;">150%</span>
                <button class="close-preview-btn" onclick="zoomPreview(0.25)" title="Zoom In" style="font-size: 16px;">+</button>
                <button class="close-preview-btn" onclick="resetZoom()" title="Reset Zoom" style="font-size: 12px; width: auto; padding: 0 10px; border-radius: 6px;">Reset</button>
            </div>
            <button class="close-preview-btn" onclick="closePreview()" title="Close Preview">&times;</button>
        </div>
        <div id="preview-container" class="preview-scroll">
            <!-- Rendered canvases will be appended here -->
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let selectedFile = null;
    let modifiedPdfBytes = null;
    let previewScale = 1.5; // Default scale for PDF preview (150%)

    // Theme Toggle Helpers
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeUI(newTheme);
    }

    function updateThemeUI(theme) {
        const sunIcon = document.querySelector('.sun-icon');
        const moonIcon = document.querySelector('.moon-icon');
        if (theme === 'dark') {
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }
    }

    // Initialize Theme
    (function initTheme() {
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
        window.addEventListener('DOMContentLoaded', () => {
            updateThemeUI(savedTheme);
            document.getElementById('zoom-label').innerText = `${Math.round(previewScale * 100)}%`;
        });
    })();

    // Hex color to PDFLib RGB object helper
    function hexToRgb(hex) {
        const r = parseInt(hex.substring(1, 3), 16) / 255;
        const g = parseInt(hex.substring(3, 5), 16) / 255;
        const b = parseInt(hex.substring(5, 7), 16) / 255;
        return PDFLib.rgb(r, g, b);
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function onFileSelect() {
        const fileInput = document.getElementById('pdf');
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            
            // Show file card, hide upload zone
            document.getElementById('upload-zone').classList.add('hidden');
            document.getElementById('file-card').classList.remove('hidden');
            
            // Set file info in badge
            document.getElementById('file-title').innerText = selectedFile.name;
            document.getElementById('file-size').innerText = formatBytes(selectedFile.size);
            
            // Pre-populate Rename input
            const baseName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) || selectedFile.name;
            document.getElementById('filename-input').value = "Final_" + baseName;

            // Update log
            const logDiv = document.getElementById('log');
            logDiv.innerText = "ફાઇલ સિલેક્ટ થઈ ગઈ છે. 'Preview Set Karo' બટન દબાવો.";
            logDiv.style.color = "var(--text-primary)";
        }
    }

    function clearFile() {
        const fileInput = document.getElementById('pdf');
        fileInput.value = ''; // Reset actual file input element
        selectedFile = null;
        modifiedPdfBytes = null;
        
        // Toggle UI panels back to original state
        document.getElementById('upload-zone').classList.remove('hidden');
        document.getElementById('file-card').classList.add('hidden');
        document.getElementById('filename-input').value = '';
        
        // Disable download button
        document.getElementById('download-btn').disabled = true;
        
        // Close preview panel
        closePreview();
        
        // Clear log
        const logDiv = document.getElementById('log');
        logDiv.innerText = "કોઈ ફાઈલ અપલોડ કરેલ નથી";
        logDiv.style.color = "var(--text-secondary)";
    }

    function closePreview() {
        const previewOuter = document.getElementById('preview-outer');
        previewOuter.classList.add('hidden');
        
        const previewContainer = document.getElementById('preview-container');
        previewContainer.innerHTML = '';
    }

    async function processSmartPDF() {
        const mrpText = document.getElementById('mrp').value;
        const offsetX = parseFloat(document.getElementById('offset-x').value) || 0;
        const offsetY = parseFloat(document.getElementById('offset-y').value) || 0;
        const fontSize = parseFloat(document.getElementById('font-size').value) || 8.5;
        const colorHex = document.getElementById('font-color').value || '#000000';
        const logDiv = document.getElementById('log');

        if (!selectedFile) {
            alert("Krupa kari ne file select karo!");
            return;
        }

        logDiv.innerText = "PDF Scan thai rahi che...";
        logDiv.style.color = "var(--text-primary)";

        try {
            const arrayBuffer = await selectedFile.arrayBuffer();
            
            // Load text with PDF.js to scan coordinates
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer.slice(0) });
            const pdfTextDoc = await loadingTask.promise;
            
            // Load with PDF-lib to edit pages
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();

            let totalMatches = 0;

            for (let i = 0; i < pdfTextDoc.numPages; i++) {
                const textPage = await pdfTextDoc.getPage(i + 1);
                const textContent = await textPage.getTextContent();
                const pageLib = pages[i];

                textContent.items.forEach(item => {
                    const cleanStr = item.str.trim();
                    
                    if (cleanStr === "New" || cleanStr === "NEW" || cleanStr.includes("New")) {
                        totalMatches++;

                        const x = item.transform[4];
                        const y = item.transform[5];

                        // Set relative coordinates using the X and Y offsets
                        const finalX = x + offsetX; 
                        const finalY = y + offsetY;

                        pageLib.drawText(mrpText, {
                            x: finalX, 
                            y: finalY,  
                            size: fontSize,   
                            color: hexToRgb(colorHex)
                        });
                    }
                });
            }

            if (totalMatches === 0) {
                logDiv.innerText = "PDF ma 'New' shabd malyo nahi.";
                logDiv.style.color = "#dc2626";
                return;
            }

            logDiv.innerText = `Total ${totalMatches} labels malya. Preview tayar che!`;
            logDiv.style.color = "#16a34a";

            // Save the modified PDF bytes in state
            modifiedPdfBytes = await pdfDoc.save();
            
            // Enable download button
            document.getElementById('download-btn').disabled = false;

            // Render PDF in preview panel
            await renderPreview(modifiedPdfBytes);
            
        } catch (err) {
            console.error(err);
            logDiv.innerText = "Bhool thai: " + err.message;
            logDiv.style.color = "#dc2626";
        }
    }

    async function renderPreview(pdfBytes) {
        const previewContainer = document.getElementById('preview-container');
        previewContainer.innerHTML = '<div class="preview-loading">Preview loading...</div>';
        
        const previewOuter = document.getElementById('preview-outer');
        previewOuter.classList.remove('hidden');
        
        try {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
            const pdfDoc = await loadingTask.promise;
            
            previewContainer.innerHTML = ''; // Clear loading message
            
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                
                // Render at dynamic previewScale
                const viewport = page.getViewport({ scale: previewScale });
                
                const canvas = document.createElement('canvas');
                canvas.className = 'preview-canvas';
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                // Wrap canvas and page number text in a wrapper
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'preview-page-wrapper';
                
                const pageLabel = document.createElement('div');
                pageLabel.className = 'preview-page-label';
                pageLabel.innerText = `Page ${i} of ${pdfDoc.numPages}`;
                
                pageWrapper.appendChild(canvas);
                pageWrapper.appendChild(pageLabel);
                
                previewContainer.appendChild(pageWrapper);
            }
        } catch (err) {
            console.error(err);
            previewContainer.innerHTML = '<div class="preview-error">Preview load karvama bhool thai.</div>';
        }
    }

    // Zoom Functions
    async function zoomPreview(delta) {
        if (!modifiedPdfBytes) return;
        const newScale = previewScale + delta;
        if (newScale >= 0.5 && newScale <= 3.0) {
            previewScale = newScale;
            document.getElementById('zoom-label').innerText = `${Math.round(previewScale * 100)}%`;
            await renderPreview(modifiedPdfBytes);
        }
    }

    async function resetZoom() {
        if (!modifiedPdfBytes) return;
        previewScale = 1.5;
        document.getElementById('zoom-label').innerText = '150%';
        await renderPreview(modifiedPdfBytes);
    }

    function downloadPDF() {
        if (!modifiedPdfBytes) {
            alert("Pela preview check karo!");
            return;
        }
        
        let filename = document.getElementById('filename-input').value.trim();
        if (!filename) {
            filename = "Final_Modified_PDF";
        }
        
        // Ensure PDF extension is appended
        if (!filename.toLowerCase().endsWith('.pdf')) {
            filename += '.pdf';
        }
        
        const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        
        const logDiv = document.getElementById('log');
        logDiv.innerText = "ફાઇલ ડાઉનલોડ થઈ ગઈ છે!";
        logDiv.style.color = "#16a34a";
    }
</script>
